<!doctype html>
<meta charset="utf-8">
<title>TikTok Authorization — FORESEEABLE Publisher</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body{font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    max-width:38rem;margin:3.5rem auto;padding:0 1.5rem;color:#16191d;background:#fbfcfd}
  @media(prefers-color-scheme:dark){body{color:#eef1f4;background:#0e1114}}
  h1{letter-spacing:-.02em;font-size:1.5rem}
  .box{margin-top:1rem;padding:1rem 1.15rem;border:1px solid #45c4cc;border-radius:8px;
    background:rgba(69,196,204,.08);word-break:break-all;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.95rem}
  .label{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:#0f7d84;font-weight:700;margin-bottom:.4rem}
  button{margin-top:1rem;font:inherit;font-weight:600;padding:.6rem 1.1rem;border:0;border-radius:7px;
    background:#0f7d84;color:#fff;cursor:pointer}
  .err{color:#c0392b;font-weight:600}
  .hint{color:#6b7783;font-size:.9rem;margin-top:1.5rem}
</style>
<h1>TikTok authorization received</h1>
<div id="out"></div>
<p class="hint">Copy the code above and paste it back into your Claude session. It expires quickly, so do it promptly.</p>
<script>
  const p = new URLSearchParams(location.search);
  const code = p.get('code'), err = p.get('error'), errDesc = p.get('error_description'), scopes = p.get('scopes');
  const out = document.getElementById('out');
  if (err) {
    out.innerHTML = '<p class="err">Authorization error: ' + err + (errDesc ? ' — ' + errDesc : '') + '</p>';
  } else if (code) {
    out.innerHTML =
      '<div class="label">Authorization code</div><div class="box" id="code">' + code + '</div>' +
      (scopes ? '<div class="hint">Granted scopes: ' + scopes + '</div>' : '') +
      '<button onclick="navigator.clipboard.writeText(document.getElementById(\'code\').textContent).then(()=>this.textContent=\'Copied ✓\')">Copy code</button>';
  } else {
    out.innerHTML = '<p>No authorization code in the URL. Start the authorization flow again.</p>';
  }
</script>
